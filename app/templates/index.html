{% extends 'base.html' %}

{% block content %}
  <section class="controls">
    <form id="search-form">
      <div class="field">
        <label for="lat">Latitude</label>
        <input id="lat" name="lat" type="number" step="any" value="{{ lat }}" required />
        <div class="error" id="error-lat"></div>
      </div>

      <div class="field">
        <label for="lon">Longitude</label>
        <input id="lon" name="lon" type="number" step="any" value="{{ lon }}" required />
        <div class="error" id="error-lon"></div>
      </div>

      <div class="field">
        <label for="radius">Radius (m)</label>
        <input id="radius" name="radius" type="number" min="1" max="10000" value="{{ radius }}" required />
        <div class="error" id="error-radius"></div>
      </div>

      <button type="submit">Search</button>
      <div class="form-error" id="form-error"></div>
    </form>
  </section>

  <section class="map-wrapper">
    <div id="map-container">{{ map_html|safe }}</div>
    <div class="meta">Found <span id="household-count">{{ 0 }}</span> households.</div>
  </section>
{% endblock %}
